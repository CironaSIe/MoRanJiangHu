<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>在线时长排行榜</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #071013;
      --panel: rgba(9, 20, 24, 0.92);
      --line: rgba(148, 163, 184, 0.22);
      --text: #e5edf0;
      --muted: #91a0a6;
      --accent: #38bdf8;
      --good: #34d399;
      --gold: #fbbf24;
      --gold-deep: #f59e0b;
      --online: #22c55e;
      --track: rgba(255, 255, 255, 0.08);
    }
    body[data-theme="day"] {
      color-scheme: light;
      --bg: #f7f3e8;
      --panel: rgba(255, 252, 245, 0.94);
      --line: rgba(120, 53, 15, 0.14);
      --text: #3f2b18;
      --muted: #7a5c43;
      --accent: #0369a1;
      --good: #047857;
      --gold: #b45309;
      --gold-deep: #92400e;
      --online: #15803d;
      --track: rgba(120, 53, 15, 0.13);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", ui-sans-serif, system-ui, sans-serif;
      background:
        radial-gradient(circle at 10% 10%, rgba(56, 189, 248, 0.18), transparent 28rem),
        radial-gradient(circle at 85% 15%, rgba(251, 191, 36, 0.14), transparent 26rem),
        var(--bg);
      color: var(--text);
      transition: background 180ms ease, color 180ms ease;
    }
    main {
      width: min(1380px, calc(100vw - 24px));
      margin: 0 auto;
      padding: 24px 0 36px;
    }
    .hero, .panel {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 18px;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.38);
      backdrop-filter: blur(10px);
    }
    .hero {
      padding: 20px;
      margin-bottom: 18px;
      background:
        linear-gradient(135deg, rgba(251, 191, 36, 0.12), rgba(56, 189, 248, 0.08)),
        var(--panel);
    }
    body[data-theme="day"] .hero {
      background:
        linear-gradient(135deg, rgba(251, 191, 36, 0.12), rgba(14, 116, 144, 0.08)),
        var(--panel);
    }
    .heroTop {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 0.08em;
    }
    .sub {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    button, .linkButton {
      height: 38px;
      border: 1px solid rgba(56, 189, 248, 0.38);
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.12);
      color: #dff6ff;
      padding: 0 16px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    body[data-theme="day"] button,
    body[data-theme="day"] .linkButton {
      border-color: rgba(3, 105, 161, 0.28);
      background: rgba(224, 242, 254, 0.9);
      color: #0c4a6e;
      box-shadow: 0 8px 20px rgba(14, 116, 144, 0.08);
    }
    button:hover, .linkButton:hover {
      background: rgba(56, 189, 248, 0.2);
    }
    body[data-theme="day"] button:hover,
    body[data-theme="day"] .linkButton:hover {
      background: rgba(186, 230, 253, 0.96);
    }
    .champion {
      margin-top: 18px;
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(260px, 0.8fr);
      gap: 16px;
    }
    .championCard {
      border: 1px solid rgba(251, 191, 36, 0.28);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(120, 53, 15, 0.18), rgba(19, 24, 27, 0.82));
      padding: 18px;
    }
    body[data-theme="day"] .championCard {
      border-color: rgba(180, 83, 9, 0.22);
      background: linear-gradient(180deg, rgba(255, 247, 237, 0.96), rgba(255, 251, 235, 0.96));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.65);
    }
    .championKicker {
      color: #fcd34d;
      font-size: 12px;
      letter-spacing: 0.28em;
    }
    body[data-theme="day"] .championKicker {
      color: #92400e !important;
    }
    .championNameRow {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .championName {
      font-size: clamp(28px, 4vw, 42px);
      font-weight: 900;
      color: #fff7d6;
      letter-spacing: 0.06em;
    }
    body[data-theme="day"] .championName {
      color: #5b3716 !important;
    }
    .pill {
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.06);
      color: #d7e7ee;
    }
    body[data-theme="day"] .pill {
      border-color: rgba(120, 53, 15, 0.14);
      background: rgba(255,255,255,0.72);
      color: #6b4b32;
    }
    .pill.online {
      border-color: rgba(34, 197, 94, 0.42);
      background: rgba(34, 197, 94, 0.12);
      color: #bbf7d0;
    }
    body[data-theme="day"] .pill.online {
      border-color: rgba(21, 128, 61, 0.28);
      background: rgba(220, 252, 231, 0.92);
      color: #166534;
    }
    .championTime {
      margin-top: 8px;
      font-size: 38px;
      line-height: 1;
      font-weight: 900;
      color: var(--gold);
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
    }
    .championMeta {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .metaBox {
      border-radius: 14px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.035);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    body[data-theme="day"] .metaBox {
      background: rgba(255,255,255,0.78);
      border-color: rgba(120, 53, 15, 0.08);
    }
    .metaBox small {
      display: block;
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 8px;
      letter-spacing: 0.12em;
    }
    .metaBox strong {
      font-size: 18px;
    }
    .championSummary {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .summaryCard {
      border-radius: 18px;
      padding: 16px;
      border: 1px solid rgba(56, 189, 248, 0.16);
      background: rgba(7, 15, 18, 0.7);
    }
    body[data-theme="day"] .summaryCard {
      border-color: rgba(3, 105, 161, 0.12);
      background: rgba(255,255,255,0.82);
    }
    .summaryCard strong {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
      letter-spacing: 0.12em;
    }
    .summaryCard span {
      font-size: 16px;
      color: #f5fbff;
      line-height: 1.7;
    }
    body[data-theme="day"] .summaryCard span {
      color: #4b3420 !important;
    }
    .panel {
      padding: 18px;
    }
    .panelHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .panelHeader h2 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0.08em;
    }
    .smallMuted {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }
    body[data-theme="day"] .smallMuted {
      color: #6f533c !important;
    }
    .board {
      display: grid;
      gap: 12px;
    }
    .row {
      display: grid;
      grid-template-columns: 74px minmax(180px, 240px) minmax(260px, 1fr) 140px 160px;
      gap: 12px;
      align-items: center;
      border-radius: 16px;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    body[data-theme="day"] .row {
      background: rgba(255,255,255,0.78);
      border-color: rgba(120, 53, 15, 0.08);
      box-shadow: 0 10px 24px rgba(120, 53, 15, 0.05);
    }
    .rank {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 900;
      font-size: 18px;
    }
    .rankBadge {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(56, 189, 248, 0.12);
      border: 1px solid rgba(56, 189, 248, 0.22);
      color: #dff6ff;
    }
    body[data-theme="day"] .rankBadge {
      background: rgba(224, 242, 254, 0.96);
      border-color: rgba(3, 105, 161, 0.14);
      color: #0c4a6e;
    }
    .row.top1 .rankBadge {
      background: rgba(251, 191, 36, 0.14);
      border-color: rgba(251, 191, 36, 0.28);
      color: #fde68a;
    }
    body[data-theme="day"] .row.top1 .rankBadge {
      background: rgba(255, 247, 237, 0.98);
      border-color: rgba(180, 83, 9, 0.18);
      color: #92400e !important;
    }
    .playerName {
      font-size: 18px;
      font-weight: 800;
      color: #f5fbff;
      letter-spacing: 0.04em;
    }
    body[data-theme="day"] .playerName {
      color: #4b3420 !important;
    }
    .playerId {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      word-break: break-all;
    }
    .timelineWrap {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .timelineTrack {
      position: relative;
      width: 100%;
      height: 22px;
      border-radius: 999px;
      overflow: hidden;
      background:
        repeating-linear-gradient(90deg, rgba(255,255,255,0.03) 0 1px, transparent 1px calc(100% / 24)),
        var(--track);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    body[data-theme="day"] .timelineTrack {
      border-color: rgba(120, 53, 15, 0.18);
      background:
        repeating-linear-gradient(90deg, rgba(120, 53, 15, 0.12) 0 1px, transparent 1px calc(100% / 24)),
        linear-gradient(180deg, rgba(120, 53, 15, 0.11), rgba(120, 53, 15, 0.07));
      box-shadow: inset 0 1px 3px rgba(120, 53, 15, 0.12);
    }
    .segment {
      position: absolute;
      top: 2px;
      bottom: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(52, 211, 153, 0.8), rgba(56, 189, 248, 0.95));
      box-shadow: 0 0 18px rgba(56, 189, 248, 0.22);
    }
    .segment.active {
      background: linear-gradient(90deg, rgba(251, 191, 36, 0.92), rgba(249, 115, 22, 0.95));
      box-shadow: 0 0 20px rgba(251, 191, 36, 0.3);
    }
    body[data-theme="day"] .segment {
      background: linear-gradient(90deg, rgba(4, 120, 87, 0.88), rgba(3, 105, 161, 0.86));
      box-shadow: 0 0 12px rgba(3, 105, 161, 0.16);
    }
    body[data-theme="day"] .segment.active {
      background: linear-gradient(90deg, rgba(146, 64, 14, 0.92), rgba(194, 65, 12, 0.9));
      box-shadow: 0 0 12px rgba(146, 64, 14, 0.18);
    }
    .timelineLabels {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 11px;
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
    }
    body[data-theme="day"] .timelineLabels {
      color: #684b35;
    }
    .timeCell, .sessionCell {
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      font-weight: 800;
    }
    .timeCell {
      color: #fde68a;
      font-size: 18px;
    }
    body[data-theme="day"] .timeCell {
      color: #92400e !important;
    }
    .sessionCell {
      color: #c7d9e2;
      font-size: 15px;
    }
    body[data-theme="day"] .sessionCell {
      color: #1f4f6b !important;
    }
    .empty {
      padding: 28px 18px;
      border-radius: 16px;
      border: 1px dashed rgba(255, 255, 255, 0.12);
      color: var(--muted);
      text-align: center;
      line-height: 1.8;
    }
    body[data-theme="day"] .empty {
      border-color: rgba(120, 53, 15, 0.12);
      background: rgba(255,255,255,0.7);
    }
    .error {
      margin-top: 12px;
      color: #fca5a5;
      font-size: 13px;
      min-height: 20px;
    }
    .demoNote {
      margin-top: 10px;
      color: #fde68a;
      font-size: 12px;
      letter-spacing: 0.08em;
    }
    body[data-theme="day"] .demoNote {
      color: #92400e;
    }
    @media (max-width: 980px) {
      main {
        width: min(100vw - 18px, 100%);
        padding: 14px 0 24px;
      }
      .hero, .panel {
        border-radius: 16px;
      }
      .hero {
        padding: 16px;
      }
      .champion {
        grid-template-columns: 1fr;
      }
      .championMeta {
        grid-template-columns: 1fr;
      }
      .row {
        grid-template-columns: 1fr;
        gap: 10px;
        padding: 14px;
      }
      .timelineTrack {
        height: 20px;
      }
    }
    @media (max-width: 640px) {
      h1 {
        font-size: 22px;
      }
      .heroTop {
        gap: 12px;
      }
      .actions {
        width: 100%;
      }
      .actions button,
      .actions .linkButton {
        flex: 1 1 calc(50% - 6px);
        min-width: 0;
        padding: 0 10px;
      }
      .championCard,
      .summaryCard,
      .panel {
        padding: 14px;
      }
      .championName {
        font-size: 26px;
      }
      .championTime {
        font-size: 30px;
      }
      .metaBox strong {
        font-size: 16px;
      }
      .panelHeader h2 {
        font-size: 16px;
      }
      .smallMuted {
        font-size: 11px;
      }
      .rank {
        justify-content: space-between;
      }
      .rankBadge {
        width: 34px;
        height: 34px;
        border-radius: 10px;
        font-size: 14px;
      }
      .playerName {
        font-size: 16px;
        line-height: 1.5;
      }
      .playerId {
        font-size: 11px;
      }
      .timelineTrack {
        height: 18px;
      }
      .timelineLabels {
        font-size: 10px;
      }
      .timeCell {
        font-size: 16px;
      }
      .sessionCell {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <div class="heroTop">
        <div>
          <h1>在线时长排行榜</h1>
          <div class="sub">
            仅统计已登录联机账号的近 24 小时在线时长。<br />
            页面每 5 分钟自动刷新一次，时间轴会展示每位玩家在最近 24 小时内的在线区间。
          </div>
        </div>
        <div class="actions">
          <a class="linkButton" href="/">返回首页</a>
          <button id="themeButton" type="button">切换白天模式</button>
          <button id="demoButton" type="button">载入演示数据</button>
          <button id="refreshButton" type="button">立即刷新</button>
        </div>
      </div>

      <div class="champion" id="championSection">
        <div class="championCard">
          <div class="championKicker">24 小时在线冠军</div>
          <div class="championNameRow">
            <div class="championName" id="championName">载入中...</div>
            <span class="pill" id="championStatus">等待数据</span>
          </div>
          <div class="championTime" id="championTime">--</div>
          <div class="championMeta">
            <div class="metaBox">
              <small>登录账号</small>
              <strong id="championUserId">--</strong>
            </div>
            <div class="metaBox">
              <small>在线会话</small>
              <strong id="championSessions">--</strong>
            </div>
            <div class="metaBox">
              <small>最后在线</small>
              <strong id="championLastSeen">--</strong>
            </div>
          </div>
        </div>
        <div class="championSummary">
          <div class="summaryCard">
            <strong>统计窗口</strong>
            <span id="windowRange">--</span>
          </div>
          <div class="summaryCard">
            <strong>排行榜状态</strong>
            <span id="boardSummary">正在读取近 24 小时在线数据...</span>
          </div>
          <div class="summaryCard">
            <strong>最后刷新</strong>
            <span id="refreshedAt">--</span>
          </div>
        </div>
      </div>

      <div class="error" id="errorMessage"></div>
      <div class="demoNote" id="demoNote"></div>
    </section>

    <section class="panel">
      <div class="panelHeader">
        <h2>近 24 小时在线时长榜</h2>
        <div class="smallMuted">每条时间轴从左到右表示“24 小时前 -> 现在”。橙金色条段表示该玩家当前仍在线。</div>
      </div>
      <div class="board" id="board"></div>
    </section>
  </main>

  <script>
    const endpoint = '/api/admin/online?public=1';
    const refreshButton = document.getElementById('refreshButton');
    const themeButton = document.getElementById('themeButton');
    const demoButton = document.getElementById('demoButton');
    const board = document.getElementById('board');
    const errorMessage = document.getElementById('errorMessage');
    const demoNote = document.getElementById('demoNote');
    const championName = document.getElementById('championName');
    const championStatus = document.getElementById('championStatus');
    const championTime = document.getElementById('championTime');
    const championUserId = document.getElementById('championUserId');
    const championSessions = document.getElementById('championSessions');
    const championLastSeen = document.getElementById('championLastSeen');
    const windowRange = document.getElementById('windowRange');
    const boardSummary = document.getElementById('boardSummary');
    const refreshedAt = document.getElementById('refreshedAt');
    const THEME_KEY = 'moranjianghu.onlineRankingTheme';
    const DEMO_PARAM = 'demo';
    const DEMO_LABEL = '当前为本地演示数据，用于预览冠军卡和时间轴效果。';

    const query = new URLSearchParams(window.location.search);

    const applyTheme = (theme) => {
      document.body.setAttribute('data-theme', theme);
      themeButton.textContent = theme === 'day' ? '切换夜间模式' : '切换白天模式';
      try {
        localStorage.setItem(THEME_KEY, theme);
      } catch {
        // ignore
      }
    };

    const readInitialTheme = () => {
      const fromQuery = query.get('theme');
      if (fromQuery === 'day' || fromQuery === 'night') return fromQuery;
      try {
        const stored = localStorage.getItem(THEME_KEY);
        if (stored === 'day' || stored === 'night') return stored;
      } catch {
        // ignore
      }
      return window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'day' : 'night';
    };

    const buildDemoPayload = () => {
      const now = new Date();
      const start = new Date(now.getTime() - 24 * 60 * 60 * 1000);
      const player = {
        userId: 'demo_user_001',
        username: '演示玩家·墨无名',
        online: true,
        sessionCount: 2,
        totalOnlineSeconds24h: 7 * 3600 + 32 * 60,
        firstSeenAt: new Date(now.getTime() - 23.5 * 60 * 60 * 1000).toISOString(),
        lastSeenAt: now.toISOString(),
        timelineSegments: [
          {
            startAt: new Date(now.getTime() - 22 * 60 * 60 * 1000).toISOString(),
            endAt: new Date(now.getTime() - 19.5 * 60 * 60 * 1000).toISOString(),
            durationSeconds: 2.5 * 3600,
            active: false
          },
          {
            startAt: new Date(now.getTime() - 14 * 60 * 60 * 1000).toISOString(),
            endAt: new Date(now.getTime() - 11.4 * 60 * 60 * 1000).toISOString(),
            durationSeconds: Math.round(2.6 * 3600),
            active: false
          },
          {
            startAt: new Date(now.getTime() - 4.1 * 60 * 60 * 1000).toISOString(),
            endAt: now.toISOString(),
            durationSeconds: Math.round(4.1 * 3600),
            active: true
          }
        ]
      };
      const player2 = {
        userId: 'demo_user_002',
        username: '演示玩家·沈青崖',
        online: false,
        sessionCount: 1,
        totalOnlineSeconds24h: 4 * 3600 + 18 * 60,
        firstSeenAt: new Date(now.getTime() - 18 * 60 * 60 * 1000).toISOString(),
        lastSeenAt: new Date(now.getTime() - 2.4 * 60 * 60 * 1000).toISOString(),
        timelineSegments: [
          {
            startAt: new Date(now.getTime() - 17 * 60 * 60 * 1000).toISOString(),
            endAt: new Date(now.getTime() - 13.6 * 60 * 60 * 1000).toISOString(),
            durationSeconds: Math.round(3.4 * 3600),
            active: false
          },
          {
            startAt: new Date(now.getTime() - 3.3 * 60 * 60 * 1000).toISOString(),
            endAt: new Date(now.getTime() - 2.4 * 60 * 60 * 1000).toISOString(),
            durationSeconds: Math.round(0.9 * 3600),
            active: false
          }
        ]
      };
      return {
        success: true,
        serverTime: now.toISOString(),
        onlineCount: 1,
        totalRecentCount: 2,
        onlineSessionCount: 2,
        ttlSeconds: 120,
        playerTimelineWindowStart: start.toISOString(),
        playerTimelineWindowEnd: now.toISOString(),
        loggedInPlayers24h: [player, player2],
        topPlayer24h: player,
        hourlyHistory: []
      };
    };

    const formatDateTime = (value) => {
      if (!value) return '--';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return '--';
      return `${date.getMonth() + 1}/${String(date.getDate()).padStart(2, '0')} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
    };

    const formatDuration = (seconds) => {
      const safe = Math.max(0, Math.round(Number(seconds) || 0));
      const hours = Math.floor(safe / 3600);
      const minutes = Math.floor((safe % 3600) / 60);
      if (hours <= 0) return `${minutes} 分钟`;
      return `${hours} 小时 ${String(minutes).padStart(2, '0')} 分`;
    };

    const getSegmentStyle = (segment, windowStartMs, windowEndMs) => {
      const startMs = new Date(segment.startAt).getTime();
      const endMs = new Date(segment.endAt).getTime();
      const total = Math.max(1, windowEndMs - windowStartMs);
      const left = ((startMs - windowStartMs) / total) * 100;
      const width = ((endMs - startMs) / total) * 100;
      return `left:${Math.max(0, Math.min(100, left))}%;width:${Math.max(0.8, Math.min(100, width))}%`;
    };

    const escapeHtml = (value) => String(value || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');

    const renderChampion = (player, payload) => {
      if (!player) {
        championName.textContent = '暂无已登录玩家';
        championStatus.textContent = '等待玩家登录';
        championStatus.className = 'pill';
        championTime.textContent = '--';
        championUserId.textContent = '--';
        championSessions.textContent = '--';
        championLastSeen.textContent = '--';
        boardSummary.textContent = '目前近 24 小时内还没有已登录联机账号在线记录。';
        return;
      }

      championName.textContent = player.username;
      championStatus.textContent = player.online ? '当前在线' : '最近离线';
      championStatus.className = player.online ? 'pill online' : 'pill';
      championTime.textContent = formatDuration(player.totalOnlineSeconds24h);
      championUserId.textContent = player.userId;
      championSessions.textContent = `${player.sessionCount} 个会话`;
      championLastSeen.textContent = formatDateTime(player.lastSeenAt);
      boardSummary.textContent = `近 24 小时共有 ${payload.loggedInPlayers24h.length} 位已登录玩家留下在线记录，当前冠军为 ${player.username}。`;
    };

    const renderBoard = (payload) => {
      const rows = Array.isArray(payload.loggedInPlayers24h) ? payload.loggedInPlayers24h : [];
      const windowStartMs = new Date(payload.playerTimelineWindowStart).getTime();
      const windowEndMs = new Date(payload.playerTimelineWindowEnd).getTime();

      if (!rows.length) {
        board.innerHTML = '<div class="empty">近 24 小时还没有已登录玩家在线记录。<br />等玩家登录联机账号并保持在线后，这里会自动显示排行榜。</div>';
        return;
      }

      board.innerHTML = rows.map((player, index) => `
        <article class="row ${index === 0 ? 'top1' : ''}">
          <div class="rank">
            <span class="rankBadge">#${index + 1}</span>
          </div>
          <div>
            <div class="playerName">${escapeHtml(player.username)} ${player.online ? '<span class="pill online">在线</span>' : ''}</div>
            <div class="playerId">${escapeHtml(player.userId)}</div>
          </div>
          <div class="timelineWrap">
            <div class="timelineTrack">
              ${(player.timelineSegments || []).map((segment) => `
                <span
                  class="segment ${segment.active ? 'active' : ''}"
                  style="${getSegmentStyle(segment, windowStartMs, windowEndMs)}"
                  title="${escapeHtml(formatDateTime(segment.startAt))} - ${escapeHtml(formatDateTime(segment.endAt))}｜${escapeHtml(formatDuration(segment.durationSeconds))}"
                ></span>
              `).join('')}
            </div>
            <div class="timelineLabels">
              <span>${escapeHtml(formatDateTime(payload.playerTimelineWindowStart))}</span>
              <span>现在</span>
            </div>
          </div>
          <div class="timeCell">${escapeHtml(formatDuration(player.totalOnlineSeconds24h))}</div>
          <div class="sessionCell">
            ${escapeHtml(`${player.sessionCount} 个会话`)}<br />
            <span class="smallMuted">最后在线 ${escapeHtml(formatDateTime(player.lastSeenAt))}</span>
          </div>
        </article>
      `).join('');
    };

    const load = async () => {
      errorMessage.textContent = '';
      demoNote.textContent = query.get(DEMO_PARAM) === '1' ? DEMO_LABEL : '';
      try {
        const payload = query.get(DEMO_PARAM) === '1'
          ? buildDemoPayload()
          : await (async () => {
              const response = await fetch(endpoint, { cache: 'no-store' });
              const data = await response.json().catch(() => null);
              if (!response.ok || !data || !data.success) throw new Error(data?.error || `HTTP ${response.status}`);
              return data;
            })();

        windowRange.textContent = `${formatDateTime(payload.playerTimelineWindowStart)} -> ${formatDateTime(payload.playerTimelineWindowEnd)}`;
        refreshedAt.textContent = formatDateTime(payload.serverTime);
        renderChampion(payload.topPlayer24h, payload);
        renderBoard(payload);
      } catch (error) {
        errorMessage.textContent = `读取在线时长排行榜失败：${error?.message || '未知错误'}`;
      }
    };

    themeButton.addEventListener('click', () => {
      applyTheme(document.body.getAttribute('data-theme') === 'day' ? 'night' : 'day');
    });
    demoButton.addEventListener('click', () => {
      query.set(DEMO_PARAM, '1');
      window.location.search = query.toString();
    });
    refreshButton.addEventListener('click', load);
    applyTheme(readInitialTheme());
    load();
    window.setInterval(load, 5 * 60 * 1000);
  </script>
</body>
</html>
