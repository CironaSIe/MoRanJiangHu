<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>物品预设图贡献后台</title>
  <style>
    :root { --paper:#f8f1df; --ink:#2b2118; --muted:#746654; --line:#d8c39d; --surface:#efe2c5; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:"Microsoft YaHei","PingFang SC",system-ui,sans-serif; background:var(--surface); color:var(--ink); }
    header { position:sticky; top:0; z-index:10; background:rgba(248,241,223,.97); border-bottom:1px solid var(--line); padding:14px 18px; }
    h1 { margin:0 0 10px; font-size:22px; }
    .toolbar { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    input, select, button, textarea { border:1px solid var(--line); background:#fffaf0; color:var(--ink); border-radius:6px; font:inherit; }
    input, select, button { height:36px; padding:0 10px; }
    textarea { width:100%; min-height:58px; padding:8px; resize:vertical; }
    button { cursor:pointer; }
    .primary { background:#5f3f18; color:#fffaf0; border-color:#5f3f18; }
    main { padding:18px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px; }
    .card { background:var(--paper); border:1px solid var(--line); border-radius:8px; overflow:hidden; box-shadow:0 2px 8px rgba(79,53,22,.08); }
    .imgbox { aspect-ratio:1/1; background:#fff9ec; display:grid; place-items:center; border-bottom:1px solid var(--line); }
    .imgbox img { max-width:100%; max-height:100%; object-fit:contain; }
    .meta { padding:12px; display:grid; gap:8px; }
    .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .tag { border:1px solid var(--line); border-radius:999px; padding:2px 8px; background:#fff7e8; color:var(--muted); font-size:12px; }
    .name { font-size:18px; font-weight:700; }
    .small { color:var(--muted); font-size:12px; line-height:1.5; word-break:break-all; }
    .actions { display:grid; gap:8px; }
    .toast { position:fixed; left:50%; bottom:18px; transform:translateX(-50%); max-width:min(680px,calc(100vw - 24px)); background:#fffaf0; border:1px solid var(--line); border-radius:8px; box-shadow:0 8px 28px rgba(79,53,22,.18); padding:10px 14px; display:none; white-space:pre-wrap; }
  </style>
</head>
<body>
<header>
  <h1>物品预设图贡献后台</h1>
  <div class="toolbar">
    <input id="token" placeholder="后台 Token，可留空使用可信 IP" />
    <select id="status">
      <option value="">全部状态</option>
      <option value="pending">待审核</option>
      <option value="approved">已通过</option>
      <option value="rejected">已拒绝</option>
      <option value="uploaded">已送图床</option>
      <option value="deleted">已清理</option>
    </select>
    <button id="loadBtn" class="primary">加载贡献</button>
    <span id="stat" class="small">未加载</span>
  </div>
</header>
<main>
  <div id="grid" class="grid"></div>
</main>
<div id="toast" class="toast"></div>
<script>
const tokenInput = document.getElementById('token');
const statusSelect = document.getElementById('status');
const grid = document.getElementById('grid');
const stat = document.getElementById('stat');
const toast = document.getElementById('toast');
tokenInput.value = localStorage.getItem('msjh-item-contribution-admin-token') || '';

function headers() {
  const token = tokenInput.value.trim();
  if (token) localStorage.setItem('msjh-item-contribution-admin-token', token);
  return token ? { Authorization: `Bearer ${token}` } : {};
}
function showToast(message) {
  toast.textContent = message;
  toast.style.display = 'block';
  clearTimeout(showToast.timer);
  showToast.timer = setTimeout(() => { toast.style.display = 'none'; }, 4500);
}
function el(tag, className, text) {
  const node = document.createElement(tag);
  if (className) node.className = className;
  if (text != null) node.textContent = text;
  return node;
}
async function api(path, options = {}) {
  const response = await fetch(path, { ...options, headers: { ...(options.headers || {}), ...headers() } });
  const result = await response.json().catch(() => ({}));
  if (!response.ok || result.error) throw new Error(result.error || `HTTP ${response.status}`);
  return result;
}
function imageUrl(item) {
  return `/api/item-preset-contribution-image?id=${encodeURIComponent(item.id)}&t=${encodeURIComponent(item.updatedAt || item.createdAt || '')}`;
}
async function review(item, status, extra = {}) {
  await api('/api/item-preset-contributions?action=' + (status === 'deleted' ? 'delete' : 'review'), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id: item.id, status, ...extra })
  });
  showToast(`${item.id} 已更新为 ${status}`);
  await load();
}
function render(items) {
  grid.textContent = '';
  for (const item of items) {
    const card = el('article', 'card');
    const imgbox = el('div', 'imgbox');
    const img = document.createElement('img');
    img.src = imageUrl(item);
    img.alt = item.itemName;
    imgbox.appendChild(img);
    const meta = el('div', 'meta');
    meta.appendChild(el('div', 'name', item.itemName));
    const row = el('div', 'row');
    row.appendChild(el('span', 'tag', item.status));
    row.appendChild(el('span', 'tag', item.itemType));
    row.appendChild(el('span', 'tag', item.quality));
    row.appendChild(el('span', 'tag', `${Math.round((item.imageSize || 0) / 1024)}KB`));
    meta.appendChild(row);
    meta.appendChild(el('div', 'small', `编号：${item.id}`));
    meta.appendChild(el('div', 'small', `时间：${new Date(item.createdAt).toLocaleString()}`));
    if (item.contributor || item.contact) meta.appendChild(el('div', 'small', `贡献者：${item.contributor || '-'} / ${item.contact || '-'}`));
    if (item.note) meta.appendChild(el('div', 'small', `备注：${item.note}`));
    const imageHostInput = document.createElement('input');
    imageHostInput.placeholder = '审核后图床链接，可选';
    const noteInput = document.createElement('textarea');
    noteInput.placeholder = '审核备注，可选';
    const actions = el('div', 'actions');
    actions.appendChild(imageHostInput);
    actions.appendChild(noteInput);
    const buttons = el('div', 'row');
    for (const [label, status] of [['通过','approved'], ['拒绝','rejected'], ['已送图床','uploaded'], ['清理','deleted']]) {
      const button = document.createElement('button');
      button.type = 'button';
      button.textContent = label;
      if (status === 'approved') button.className = 'primary';
      button.onclick = () => review(item, status, { note: noteInput.value.trim(), imageHostUrl: imageHostInput.value.trim() });
      buttons.appendChild(button);
    }
    actions.appendChild(buttons);
    meta.appendChild(actions);
    card.appendChild(imgbox);
    card.appendChild(meta);
    grid.appendChild(card);
  }
}
async function load() {
  grid.textContent = '加载中...';
  try {
    const qs = new URLSearchParams({ limit: '100' });
    if (statusSelect.value) qs.set('status', statusSelect.value);
    const result = await api(`/api/item-preset-contributions?${qs.toString()}`);
    render(result.contributions || []);
    stat.textContent = `共 ${result.contributions?.length || 0} 条`;
  } catch (error) {
    grid.textContent = '';
    stat.textContent = error.message || '加载失败';
    showToast(stat.textContent);
  }
}
document.getElementById('loadBtn').onclick = load;
statusSelect.onchange = load;
</script>
</body>
</html>
